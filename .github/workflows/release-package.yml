name: Release Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run tests
        run: node test-bar-color.js

      - name: Validate manifest version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag v$TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Build release ZIP
        run: zip -r release.zip manifest.json background.js popup.html popup.js popup.css icons/

      - name: List ZIP contents
        run: unzip -l release.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release.zip
          generate_release_notes: true
